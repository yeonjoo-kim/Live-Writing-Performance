<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Writing Performance</title>
  <link rel="icon" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Cpath fill="%23000" d="M32 56S6 40 6 21c0-8.3 6.5-15 14.6-15 4.8 0 9.1 2.3 11.4 6 2.3-3.7 6.6-6 11.4-6C51.5 6 58 12.7 58 21c0 19-26 35-26 35z"/%3E%3C/svg%3E'>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dongle:wght@300;400&family=Dosis:wght@300;400&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: "Dongle";
      src: local("Dongle Light"), local("Dongle-Light");
      font-weight: 300;
      font-style: normal;
    }

    @font-face {
      font-family: "Dongle";
      src: local("Dongle Regular"), local("Dongle-Regular"), local("Dongle");
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: "Dosis";
      src: local("Dosis Light"), local("Dosis-Light");
      font-weight: 300;
      font-style: normal;
    }

    @font-face {
      font-family: "Dosis";
      src: local("Dosis Regular"), local("Dosis-Regular"), local("Dosis");
      font-weight: 400;
      font-style: normal;
    }

    :root {
      --stage-width: 1080px;
      --stage-height: 1920px;
      --box-width: 940px;
      --box-height: 821px;
      --edge: 70px;
      --gap: 140px;
      --ink: #000;
      --note: #c0c0c0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      background: #fff;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .stage-frame {
      position: relative;
      width: min(100vw, 56.25dvh);
      aspect-ratio: 9 / 16;
      background: #fff;
      outline: 1px solid #e7e7e7;
      overflow: hidden;
      container-type: size;
    }

    .stage {
      position: relative;
      width: 100cqw;
      height: 100cqh;
      background: #fff;
      overflow: hidden;
    }

    .text-box {
      position: absolute;
      left: 6.481481cqw;
      width: 87.037037cqw;
      height: 33.072917cqh;
      color: var(--ink);
      text-align: left;
      overflow-x: hidden;
      overflow-y: auto;
      border: 0;
      outline: 0;
      background: transparent;
      resize: none;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      hyphens: none;
      -webkit-hyphens: none;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .text-box::-webkit-scrollbar {
      display: none;
    }

    .ko {
      top: 3.645833cqh;
      font-family: "Dongle", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      font-size: 5.833333cqw;
      font-style: normal;
      font-weight: 300;
      line-height: 8.333333cqw;
      letter-spacing: -0.082407cqw;
      font-kerning: none;
      font-feature-settings: "kern" 0;
      font-variant-ligatures: none;
      text-rendering: geometricPrecision;
      word-break: keep-all;
      caret-color: transparent;
      cursor: text;
    }

    .en {
      top: 44.010417cqh;
      font-family: "Dosis", "Helvetica Neue", Arial, sans-serif;
      font-size: 3.703704cqw;
      font-style: normal;
      font-weight: 400;
      line-height: 6.481481cqw;
      letter-spacing: 0.125cqw;
      word-break: normal;
      pointer-events: auto;
      user-select: text;
    }

    body.screen-mode .text-box {
      pointer-events: none;
    }

    body.view-mode .ko {
      cursor: default;
    }

    body.author-mode .ko {
      cursor: text;
      -webkit-user-modify: read-write-plaintext-only;
    }

    .custom-caret {
      position: absolute;
      left: 6.481481cqw;
      top: 3.645833cqh;
      width: 0.462963cqw;
      height: 3.888889cqw;
      background: var(--ink);
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      animation: caret-blink 1s step-end infinite;
    }

    .custom-caret.is-visible {
      opacity: 1;
    }

    .custom-caret.is-writing {
      animation: none;
      opacity: 1;
    }

    .annotation {
      position: absolute;
      left: 6.481481cqw;
      top: 80.15625cqh;
      width: 87.037037cqw;
      height: 12.5cqh;
      color: var(--note);
      overflow: hidden;
      pointer-events: none;
    }

    .annotation-ko,
    .annotation-en {
      margin: 0;
      text-align: left;
      white-space: normal;
      word-break: normal;
      overflow-wrap: break-word;
    }

    .annotation-ko {
      font-family: "Dongle", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      font-size: 3.148148cqw;
      font-weight: 300;
      line-height: 3.240741cqw;
      letter-spacing: 0;
      font-kerning: none;
      font-feature-settings: "kern" 0;
      font-variant-ligatures: none;
      text-rendering: geometricPrecision;
    }

    .annotation-en {
      margin-top: 1.481481cqw;
      font-family: "Dosis", "Helvetica Neue", Arial, sans-serif;
      font-size: 2.037037cqw;
      font-weight: 300;
      line-height: 2.777778cqw;
      letter-spacing: 0.092593cqw;
    }

    .site-footer {
      position: absolute;
      left: 6.481481cqw;
      bottom: 3.645833cqh;
      width: 87.037037cqw;
      color: var(--note);
      font-family: "Dosis", "Helvetica Neue", Arial, sans-serif;
      font-size: 2.037037cqw;
      font-weight: 300;
      line-height: 2.777778cqw;
      letter-spacing: 0.092593cqw;
      text-align: center;
      white-space: nowrap;
      z-index: 2;
    }

    .site-footer a {
      color: inherit;
      text-decoration: none;
    }

    @keyframes caret-blink {
      0%,
      49.999% {
        opacity: 1;
      }

      50%,
      100% {
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="stage-frame" aria-label="1080 by 1920 writing frame">
    <main class="stage" aria-label="Live Korean and English writing canvas">
      <div id="koreanEditor" class="text-box ko" contenteditable="false" spellcheck="false" aria-label="Korean live writing"></div>
      <div id="englishOutput" class="text-box en" lang="en" aria-label="English live translation"></div>
      <div id="customCaret" class="custom-caret" aria-hidden="true"></div>
      <aside class="annotation" aria-label="Cursor note">
        <p id="annotationKo" class="annotation-ko"></p>
        <p id="annotationEn" class="annotation-en"></p>
      </aside>
      <footer class="site-footer">
        <a href="https://www.instagram.com/yeonjoookim/" target="_blank" rel="noopener">©2026. Yeonjoo Kim All Rights Reserved.</a>
      </footer>
    </main>
  </div>

  <script type="module">
    const INITIAL_KO = "이 글은 잉여로서의 디자인, 디자인으로서의 잉여에 대한 개인적인 소견을 담는다. 글을 쓰는 동시에 이 화면에 글이 표시되며, 이 디지털 시계 환경을 플랫폼 삼아 라이브로 송출되지만 그게 언제, 몇 시 몇 분일지는 아무도 모른다.";
    const INITIAL_EN = "This piece shares my personal thoughts on design as surplus, and surplus as design. As I write, the words show up on this screen in real time, and they will be streamed live through this digital clock environment as a platform. But nobody knows when that will happen, down to the hour or minute.";
    const ANNOTATION_KO = "이 글은 잉여로서의 디자인, 디자인으로서의 잉여에 대한 개인적인 소견을 담는다. 글을 쓰는 동시에 이 화면에 글이 표시되며, 이 디지털 시계 환경을 플랫폼 삼아 라이브로 송출되지만 그게 언제, 몇 시 몇 분일지는 아무도 모른다. 이 커서는 1초마다 깜빡이고 있다.";
    const ANNOTATION_EN = "This text shares my personal thoughts on design as surplus, and surplus as design. As I write, the words appear on this screen, using this digital clock environment as a platform. It will be streamed live, but nobody knows when, down to the hour or minute. This cursor is blinking every second.";
    const STORAGE_KEY_KO = "live-writing-ko-v5";
    const STORAGE_KEY_EN = "live-writing-en-v5";
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyCxdO-0aYU1JVdCKzR3zwfubAh_gHiRWHU",
      authDomain: "live-typing-on-design.firebaseapp.com",
      databaseURL: "https://live-typing-on-design-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "live-typing-on-design",
      storageBucket: "live-typing-on-design.firebasestorage.app",
      messagingSenderId: "182859072415",
      appId: "1:182859072415:web:db5aa9a6bd903ff1e473aa"
    };
    const AUTHOR_EMAIL = "gondry3261@snu.ac.kr";
    const LIVE_STATE_PATH = "liveWritingPerformance/current";

    const editor = document.getElementById("koreanEditor");
    const output = document.getElementById("englishOutput");
    const caret = document.getElementById("customCaret");
    const annotationKo = document.getElementById("annotationKo");
    const annotationEn = document.getElementById("annotationEn");
    const params = new URLSearchParams(window.location.search);
    const screenMode = params.get("screen") === "1";
    let writeMode = false;
    const viewMode = true;
    let authorShortcutStep = 0;
    let authorShortcutTimer = 0;
    let writingTimer = 0;
    let translateTimer = 0;
    let publishTimer = 0;
    let translatorReady = null;
    let lastTranslationRequest = 0;
    let syncingScroll = false;
    let applyingRemoteState = false;
    let currentCaretBase = null;
    let remoteCaretBase = null;
    let realtimeStateRef = null;
    let realtimeSet = null;
    let realtimeServerTimestamp = null;
    let firebaseAuth = null;
    let googleProvider = null;
    let signInWithPopupFn = null;
    let realtimeInitialized = false;

    setWritingAccess(writeMode);

    if (screenMode) {
      document.body.classList.add("screen-mode");
      window.addEventListener("wheel", preventManualScroll, { passive: false });
      window.addEventListener("touchmove", preventManualScroll, { passive: false });
    } else {
      document.addEventListener("keydown", handleAuthorShortcut);
    }

    editor.textContent = localStorage.getItem(STORAGE_KEY_KO) || INITIAL_KO;
    output.textContent = localStorage.getItem(STORAGE_KEY_EN) || INITIAL_EN;
    annotationKo.textContent = ANNOTATION_KO;
    annotationEn.textContent = ANNOTATION_EN;
    initRealtime().catch((error) => {
      console.warn("Realtime mode is unavailable.", error);
    });

    editor.addEventListener("input", () => {
      localStorage.setItem(STORAGE_KEY_KO, editor.innerText);
      keepCaretNearMiddle(editor);
      syncTranslationScroll();
      setWritingState();
      scheduleTranslation();
      updateCaret();
      queueRealtimePublish();
    });

    editor.addEventListener("keydown", setWritingState);
    editor.addEventListener("keyup", () => {
      keepCaretNearMiddle(editor);
      updateCaret();
      queueRealtimePublish();
    });
    editor.addEventListener("click", () => {
      updateCaret();
      queueRealtimePublish();
    });
    editor.addEventListener("focus", () => {
      caret.classList.add("is-visible");
      updateCaret();
    });
    editor.addEventListener("blur", () => {
      caret.classList.remove("is-writing");
      updateCaret();
    });
    editor.addEventListener("paste", pastePlainText);
    editor.addEventListener("scroll", () => {
      syncPairedScroll(editor, output);
      queueRealtimePublish(80);
    });
    output.addEventListener("scroll", () => {
      syncPairedScroll(output, editor);
      queueRealtimePublish(80);
    });
    document.addEventListener("selectionchange", () => {
      if (document.activeElement === editor) {
        updateCaret();
      }
    });
    window.addEventListener("resize", updateCaret);

    requestAnimationFrame(() => {
      if (!viewMode) {
        editor.focus();
        placeCaretAtEnd(editor);
      }
      scrollLatestIntoView();
    });

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => requestAnimationFrame(scrollLatestIntoView));
    }

    function scheduleTranslation() {
      window.clearTimeout(translateTimer);
      translateTimer = window.setTimeout(translateCurrentText, 250);
    }

    async function translateCurrentText() {
      const requestId = Date.now();
      lastTranslationRequest = requestId;
      const sourceText = normalizeEditorText(editor.innerText);

      if (!sourceText.trim()) {
        commitTranslation("");
        return;
      }

      if (sourceText.trim() === INITIAL_KO) {
        commitTranslation(INITIAL_EN);
        return;
      }

      try {
        const translated = await translatePreservingLineBreaks(sourceText);
        if (requestId === lastTranslationRequest && translated) {
          commitTranslation(translated);
        }
      } catch (error) {
        console.warn("Translation unavailable. Keeping the most recent English text.", error);
      }
    }

    function commitTranslation(text) {
      output.textContent = text;
      localStorage.setItem(STORAGE_KEY_EN, text);
      queueRealtimePublish();
      requestAnimationFrame(scrollLatestIntoView);
    }

    function setWritingAccess(enabled) {
      writeMode = enabled;
      document.body.classList.toggle("author-mode", enabled);
      document.body.classList.toggle("view-mode", !enabled);
      editor.setAttribute("contenteditable", enabled ? "true" : "false");

      if (enabled) {
        editor.removeAttribute("tabindex");
      } else {
        editor.setAttribute("tabindex", "-1");
      }
    }

    function handleAuthorShortcut(event) {
      if (writeMode || !event.metaKey) {
        return;
      }

      const key = event.key.toLowerCase();
      if (key === "y") {
        event.preventDefault();
        authorShortcutStep = 1;
        window.clearTimeout(authorShortcutTimer);
        authorShortcutTimer = window.setTimeout(resetAuthorShortcut, 1200);
        return;
      }

      if (key === "j" && authorShortcutStep === 1) {
        event.preventDefault();
        resetAuthorShortcut();
        unlockAuthorMode();
      }
    }

    async function unlockAuthorMode() {
      if (location.protocol === "file:") {
        showAuthorError("Firebase Google login cannot run from a file:// address. Open http://localhost:8080/index.html or your GitHub Pages URL instead.");
        return;
      }

      try {
        if (hasFirebaseConfig()) {
          await initRealtime();
          const user = firebaseAuth.currentUser || (await signInWithPopupFn(firebaseAuth, googleProvider)).user;

          if (!isAuthorUser(user)) {
            showAuthorError("This Google account is not allowed to write to this performance.");
            return;
          }
        }

        setWritingAccess(true);
        editor.focus();
        placeCaretAtEnd(editor);
        scrollLatestIntoView();
        queueRealtimePublish(0);
      } catch (error) {
        showAuthorError(getAuthorLoginMessage(error));
      }
    }

    function showAuthorError(message) {
      console.warn(message);
      window.alert(message);
    }

    function getAuthorLoginMessage(error) {
      const code = error && error.code;

      if (code === "auth/operation-not-allowed") {
        return "Google login is not enabled yet. In Firebase Console, enable Authentication > Sign-in method > Google.";
      }

      if (code === "auth/unauthorized-domain") {
        return "This domain is not authorized for Firebase login. Add localhost and your GitHub Pages domain in Firebase Authentication > Settings > Authorized domains.";
      }

      if (code === "auth/popup-closed-by-user") {
        return "The Google login popup was closed before login finished. Please try again and complete the Google login.";
      }

      if (code === "auth/popup-blocked") {
        return "The browser blocked the Google login popup. Please allow popups for this site.";
      }

      return `Author login failed${code ? ` (${code})` : ""}.`;
    }

    function resetAuthorShortcut() {
      authorShortcutStep = 0;
      window.clearTimeout(authorShortcutTimer);
      authorShortcutTimer = 0;
    }

    async function initRealtime() {
      if (realtimeInitialized || !hasFirebaseConfig()) {
        return;
      }

      realtimeInitialized = true;
      const [
        appModule,
        databaseModule,
        authModule
      ] = await Promise.all([
        import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js"),
        import("https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js"),
        import("https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js")
      ]);

      const app = appModule.initializeApp(FIREBASE_CONFIG);
      const database = databaseModule.getDatabase(app);
      firebaseAuth = authModule.getAuth(app);
      googleProvider = new authModule.GoogleAuthProvider();
      signInWithPopupFn = authModule.signInWithPopup;
      realtimeSet = databaseModule.set;
      realtimeServerTimestamp = databaseModule.serverTimestamp;
      realtimeStateRef = databaseModule.ref(database, LIVE_STATE_PATH);

      databaseModule.onValue(realtimeStateRef, (snapshot) => {
        const state = snapshot.val();
        if (state) {
          applyRemoteState(state);
        }
      });
    }

    function hasFirebaseConfig() {
      return Boolean(
        FIREBASE_CONFIG.apiKey
        && FIREBASE_CONFIG.authDomain
        && FIREBASE_CONFIG.databaseURL
        && FIREBASE_CONFIG.projectId
        && FIREBASE_CONFIG.appId
      );
    }

    function isAuthorUser(user) {
      return Boolean(user && AUTHOR_EMAIL && user.email === AUTHOR_EMAIL);
    }

    function queueRealtimePublish(delay = 120) {
      if (!writeMode || !realtimeStateRef || !realtimeSet || applyingRemoteState) {
        return;
      }

      window.clearTimeout(publishTimer);
      publishTimer = window.setTimeout(publishRealtimeState, delay);
    }

    async function publishRealtimeState() {
      if (!writeMode || !realtimeStateRef || !realtimeSet) {
        return;
      }

      try {
        await realtimeSet(realtimeStateRef, getCurrentLiveState());
      } catch (error) {
        console.warn("Realtime publish failed.", error);
      }
    }

    function getCurrentLiveState() {
      return {
        koreanText: editor.innerText,
        englishText: output.textContent,
        editorScrollRatio: getScrollRatio(editor),
        outputScrollRatio: getScrollRatio(output),
        caret: currentCaretBase,
        updatedAt: realtimeServerTimestamp ? realtimeServerTimestamp() : Date.now()
      };
    }

    function applyRemoteState(state) {
      if (writeMode) {
        return;
      }

      applyingRemoteState = true;
      if (typeof state.koreanText === "string" && editor.textContent !== state.koreanText) {
        editor.textContent = state.koreanText;
      }

      if (typeof state.englishText === "string" && output.textContent !== state.englishText) {
        output.textContent = state.englishText;
      }

      localStorage.setItem(STORAGE_KEY_KO, editor.innerText);
      localStorage.setItem(STORAGE_KEY_EN, output.textContent);
      remoteCaretBase = state.caret || null;

      requestAnimationFrame(() => {
        setScrollRatio(editor, state.editorScrollRatio);
        setScrollRatio(output, state.outputScrollRatio);
        updateCaret();
        applyingRemoteState = false;
      });
    }

    function getScrollRatio(element) {
      const maxScroll = element.scrollHeight - element.clientHeight;
      return maxScroll > 0 ? element.scrollTop / maxScroll : 0;
    }

    function setScrollRatio(element, ratio = 1) {
      const maxScroll = element.scrollHeight - element.clientHeight;
      element.scrollTop = maxScroll > 0 ? maxScroll * ratio : 0;
    }

    async function translatePreservingLineBreaks(text) {
      const lines = text.split(/\n/);
      const translatedLines = [];

      for (const line of lines) {
        const trimmedLine = line.trim();
        translatedLines.push(trimmedLine ? await translateCasually(trimmedLine) : "");
      }

      return translatedLines.join("\n");
    }

    async function translateCasually(text) {
      const providers = [
        translateWithBuiltInBrowser,
        translateWithGoogle,
        translateWithMyMemory
      ];

      for (const provider of providers) {
        try {
          const translated = await provider(text);
          if (translated) {
            return softenTranslation(translated);
          }
        } catch (error) {
          console.warn("Translation provider unavailable. Trying the next one.", error);
        }
      }

      return "";
    }

    async function translateWithBuiltInBrowser(text) {
      const TranslatorConstructor = window.Translator;
      if (TranslatorConstructor && typeof TranslatorConstructor.create === "function") {
        translatorReady ||= TranslatorConstructor.create({
          sourceLanguage: "ko",
          targetLanguage: "en"
        });
        const translator = await translatorReady;
        return translator.translate(text);
      }

      if (window.translation && typeof window.translation.createTranslator === "function") {
        translatorReady ||= window.translation.createTranslator({
          sourceLanguage: "ko",
          targetLanguage: "en"
        });
        const translator = await translatorReady;
        return translator.translate(text);
      }

      return "";
    }

    async function translateWithGoogle(text) {
      const url = new URL("https://translate.googleapis.com/translate_a/single");
      url.searchParams.set("client", "gtx");
      url.searchParams.set("sl", "ko");
      url.searchParams.set("tl", "en");
      url.searchParams.set("dt", "t");
      url.searchParams.set("q", text);

      const response = await fetch(url.toString());
      if (!response.ok) {
        return "";
      }

      const data = await response.json();
      return Array.isArray(data[0])
        ? data[0].map((part) => part[0]).join("")
        : "";
    }

    async function translateWithMyMemory(text) {
      const url = new URL("https://api.mymemory.translated.net/get");
      url.searchParams.set("q", text.slice(0, 4900));
      url.searchParams.set("langpair", "ko|en");

      const response = await fetch(url.toString());
      if (!response.ok) {
        return "";
      }

      const data = await response.json();
      return data && data.responseData ? data.responseData.translatedText : "";
    }

    function softenTranslation(text) {
      return text
        .replace(/\butilized\b/gi, "used")
        .replace(/\butilize\b/gi, "use")
        .replace(/\btherefore\b/gi, "so")
        .replace(/\bhowever\b/gi, "but")
        .replace(/\bnevertheless\b/gi, "still")
        .replace(/\bregarding\b/gi, "about")
        .replace(/\bis displayed\b/gi, "shows up")
        .replace(/\bno one\b/gi, "nobody")
        .replace(/\s+/g, " ")
        .trim();
    }

    function normalizeEditorText(text) {
      return text.replace(/\u00a0/g, " ").trim();
    }

    function keepCaretNearMiddle(box) {
      const selection = window.getSelection();
      if (!selection.rangeCount || !box.contains(selection.anchorNode)) {
        return;
      }

      const range = selection.getRangeAt(0).cloneRange();
      range.collapse(true);
      const rect = getRangeRect(range);
      if (!rect) {
        return;
      }

      const boxRect = box.getBoundingClientRect();
      const bottomTrigger = boxRect.bottom - parseFloat(getComputedStyle(box).lineHeight);

      if (rect.bottom >= bottomTrigger) {
        box.scrollTop += rect.top - boxRect.top - box.clientHeight / 2;
      }
    }

    function syncTranslationScroll() {
      syncPairedScroll(editor, output, true);
    }

    function scrollLatestIntoView() {
      if (applyingRemoteState) {
        return;
      }

      const maxScroll = Math.max(0, editor.scrollHeight - editor.clientHeight);
      editor.scrollTop = maxScroll;
      syncTranslationScroll();
      updateCaret();
    }

    function syncPairedScroll(source, target, force = false) {
      if (syncingScroll && !force) {
        return;
      }

      const sourceMax = source.scrollHeight - source.clientHeight;
      const targetMax = target.scrollHeight - target.clientHeight;
      const ratio = sourceMax > 0 ? source.scrollTop / sourceMax : 0;

      syncingScroll = true;
      target.scrollTop = targetMax > 0 ? ratio * targetMax : 0;
      requestAnimationFrame(() => {
        syncingScroll = false;
      });
    }

    function updateCaret() {
      if (!writeMode && remoteCaretBase) {
        setCaretTransform(remoteCaretBase);
        caret.classList.add("is-visible");
        return;
      }

      const selection = window.getSelection();
      const useSelection = document.activeElement === editor
        && selection.rangeCount
        && editor.contains(selection.anchorNode);
      const range = useSelection
        ? selection.getRangeAt(0).cloneRange()
        : getEndRange(editor);
      range.collapse(true);
      const rect = getRangeRect(range);
      const editorRect = editor.getBoundingClientRect();

      caret.classList.add("is-visible");
      if (!rect) {
        caret.style.transform = "translate(0, 0)";
        return;
      }

      const scale = editorRect.width / 940;
      const xOffset = document.body.classList.contains("author-mode") ? 6 : 22;
      const yOffset = document.body.classList.contains("author-mode") ? 24 : 26;
      const x = rect.left - editorRect.left + xOffset * scale;
      const y = rect.top - editorRect.top + yOffset * scale;
      const basePosition = {
        x: x / scale,
        y: y / scale
      };
      setCaretTransform(basePosition);
    }

    function setCaretTransform(basePosition) {
      if (!basePosition) {
        return;
      }

      const editorRect = editor.getBoundingClientRect();
      const scale = editorRect.width / 940;
      currentCaretBase = {
        x: basePosition.x,
        y: basePosition.y
      };
      caret.style.transform = `translate(${basePosition.x * scale}px, ${basePosition.y * scale}px)`;
    }

    function getEndRange(element) {
      const range = document.createRange();
      range.selectNodeContents(element);
      range.collapse(false);
      return range;
    }

    function getRangeRect(range) {
      const rect = range.getClientRects()[0];
      if (rect) {
        return rect;
      }

      const marker = document.createElement("span");
      marker.textContent = "\u200b";
      range.insertNode(marker);
      const markerRect = marker.getBoundingClientRect();
      marker.remove();
      return markerRect.width || markerRect.height ? markerRect : null;
    }

    function setWritingState() {
      caret.classList.add("is-writing");
      window.clearTimeout(writingTimer);
      writingTimer = window.setTimeout(() => {
        caret.classList.remove("is-writing");
        writingTimer = 0;
      }, 450);
    }

    function placeCaretAtEnd(element) {
      const range = document.createRange();
      const selection = window.getSelection();
      range.selectNodeContents(element);
      range.collapse(false);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function pastePlainText(event) {
      event.preventDefault();
      const text = event.clipboardData.getData("text/plain");
      document.execCommand("insertText", false, text);
    }

    function preventManualScroll(event) {
      if (event.target.closest && event.target.closest(".text-box")) {
        event.preventDefault();
      }
    }
  </script>
</body>
</html>
